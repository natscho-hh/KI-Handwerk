<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Automatisierung</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas { display: block; }

    #title {
      position: absolute;
      top: 18px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #title h1 {
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #ff3333;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #title p { color: #444; font-size: 0.7rem; letter-spacing: 3px; margin-top: 4px; }

    #stats {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      z-index: 10;
      pointer-events: none;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.6rem; font-weight: bold; color: #ff3333; }
    .stat-label { font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

    /* Blitz-Overlay: kurzer weißer Blitz */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.05s;
    }

    /* Nachrichten-Box erscheint nach dem Blitz */
    #alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(0,0,0,0.92);
      border: 2px solid #ff3333;
      padding: clamp(16px, 3vw, 32px) clamp(20px, 5vw, 60px);
      text-align: center;
      z-index: 60;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      max-width: 90vw;
    }
    #alert-box.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #alert-percent {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: bold;
      color: #ff3333;
      line-height: 1;
      letter-spacing: -2px;
    }
    #alert-main {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    #alert-sub {
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      color: #888;
      letter-spacing: 2px;
      margin-top: 10px;
      line-height: 1.6;
    }
    #alert-source {
      font-size: 0.6rem;
      color: #444;
      margin-top: 14px;
      letter-spacing: 1px;
    }
    /* Rote Linie links */
    #alert-box::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: #ff3333;
    }
  </style>
</head>
<body>

<div id="title">
  <h1>Die Automatisierung</h1>
  <p>Was kommt als nächstes?</p>
</div>

<canvas id="c"></canvas>

<div id="flash"></div>

<div id="alert-box">
  <div id="alert-percent">80%</div>
  <div id="alert-main">aller administrativen Jobs</div>
  <div id="alert-sub"></div>
  <div id="alert-source"></div>
</div>

<div id="stats">
  <div class="stat"><div class="stat-num" id="s-robots">0</div><div class="stat-label">Roboter aktiv</div></div>
  <div class="stat"><div class="stat-num" id="s-eaten">0</div><div class="stat-label">Jobs ersetzt</div></div>
  <div class="stat"><div class="stat-num" id="s-humans">0</div><div class="stat-label">Menschen übrig</div></div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false });
const flash  = document.getElementById('flash');
const alertBox = document.getElementById('alert-box');
let W = 0, H = 0;

// ── BOTSCHAFTEN die nach dem Blitz erscheinen ──────────────────────────────────
const ALERTS = [
  {
    percent: '80%',
    main: 'aller administrativen Jobs',
    sub: 'werden durch KI & Robotik ersetzt\nBuchhalter · Sachbearbeiter · Assistenten',
    source: 'McKinsey Global Institute, 2023'
  },
  {
    percent: '300 Mio.',
    main: 'Vollzeitstellen weltweit',
    sub: 'könnten durch KI-Automatisierung\nvollständig wegfallen',
    source: 'Goldman Sachs Research, 2023'
  },
  {
    percent: '47%',
    main: 'aller Berufe in Deutschland',
    sub: 'haben ein hohes Automatisierungsrisiko\nin den nächsten 10-20 Jahren',
    source: 'Institut für Arbeitsmarkt- und Berufsforschung'
  },
  {
    percent: '2030',
    main: 'ist näher als du denkst',
    sub: 'KI erledigt heute schon:\nE-Mail · Analyse · Buchhaltung · Support',
    source: 'World Economic Forum Future of Jobs Report'
  },
  {
    percent: '4×',
    main: 'schneller als die industrielle Revolution',
    sub: 'Die KI-Automatisierung verändert\ndie Arbeitswelt in Rekordtempo',
    source: 'MIT Technology Review, 2024'
  },
];
let alertIdx = 0;

// ── BLITZ-SYSTEM ───────────────────────────────────────────────────────────────
let lightning = null;      // aktueller Blitz
let lightningTimer = 0;    // Zeit bis zum nächsten Blitz (in Sekunden)
let nextLightningIn = 8;   // erster Blitz nach 8 Sekunden

function scheduleLightning() {
  nextLightningIn = 9 + Math.random() * 7; // alle 9-16 Sekunden
}

function triggerLightning() {
  // Blitz-Pfad generieren (gezackter Pfad von oben nach Mitte)
  const bolts = [];
  const cx = W / 2 + (Math.random() - 0.5) * W * 0.1;
  let x = cx, y = 0;
  const segments = 10 + Math.floor(Math.random() * 6);
  bolts.push({ x, y });
  for (let i = 1; i <= segments; i++) {
    x += (Math.random() - 0.5) * 80;
    y = (H * 0.55) * (i / segments);
    bolts.push({ x, y });
  }

  lightning = {
    bolts,
    alpha: 1,
    phase: 'flash', // flash → show → fade
    timer: 0,
  };

  // Screen-Flash
  flash.style.opacity = '0.7';
  setTimeout(() => { flash.style.opacity = '0'; }, 80);
  setTimeout(() => { flash.style.opacity = '0.3'; }, 130);
  setTimeout(() => { flash.style.opacity = '0'; }, 200);

  // Alert-Box anzeigen
  setTimeout(() => showAlert(), 250);

  scheduleLightning();
}

function showAlert() {
  const a = ALERTS[alertIdx % ALERTS.length];
  alertIdx++;
  document.getElementById('alert-percent').textContent = a.percent;
  document.getElementById('alert-main').textContent    = a.main;
  document.getElementById('alert-sub').innerHTML       = a.sub.replace('\n','<br>');
  document.getElementById('alert-source').textContent  = '— ' + a.source;
  alertBox.classList.add('visible');
  setTimeout(() => alertBox.classList.remove('visible'), 3200);
}

function drawLightning(dt) {
  if (!lightning) return;
  lightning.timer += dt;

  if (lightning.alpha <= 0) { lightning = null; return; }
  lightning.alpha -= dt * 1.2;

  const bolts = lightning.bolts;
  const a = Math.max(0, lightning.alpha);

  // Haupt-Blitz (dick, weiß)
  ctx.globalAlpha = a;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  bolts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Leuchtender Kern (gelb, dünn)
  ctx.strokeStyle = '#ffee44';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  bolts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Leuchtschein (breiter, transparent orange)
  ctx.strokeStyle = `rgba(255,100,0,${a * 0.3})`;
  ctx.lineWidth = 12;
  ctx.beginPath();
  bolts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Einschlag-Punkt unten
  const tip = bolts[bolts.length - 1];
  ctx.fillStyle = `rgba(255,220,0,${a})`;
  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 8 * a, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.lineWidth = 1;
}

// ── ADAPTIVE QUALITY ──────────────────────────────────────────────────────────
let NUM_ROBOTS = 6, NUM_HUMANS = 20, MAX_PARTICLES = 30;
let fpsHistory = [], lastFpsCheck = 0, frameCount = 0;

function checkFPS(now) {
  frameCount++;
  if (now - lastFpsCheck > 2000) {
    const fps = frameCount / ((now - lastFpsCheck) / 1000);
    fpsHistory.push(fps);
    if (fpsHistory.length > 3) fpsHistory.shift();
    const avg = fpsHistory.reduce((a,b) => a+b, 0) / fpsHistory.length;
    if (avg > 50 && NUM_HUMANS < 28) NUM_HUMANS = Math.min(28, NUM_HUMANS + 2);
    else if (avg < 30) { NUM_HUMANS = Math.max(10, NUM_HUMANS - 3); MAX_PARTICLES = Math.max(10, MAX_PARTICLES - 5); }
    frameCount = 0;
    lastFpsCheck = now;
  }
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildBackground();
}
window.addEventListener('resize', () => { resize(); spawnAll(); });

// ── HINTERGRUND ───────────────────────────────────────────────────────────────
let bgCanvas;
function buildBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bc = bgCanvas.getContext('2d');
  bc.fillStyle = '#050510';
  bc.fillRect(0, 0, W, H);
  bc.strokeStyle = 'rgba(0,80,200,0.06)';
  bc.lineWidth = 1;
  const g = 60;
  for (let x = 0; x < W; x += g) { bc.beginPath(); bc.moveTo(x,0); bc.lineTo(x,H); bc.stroke(); }
  for (let y = 0; y < H; y += g) { bc.beginPath(); bc.moveTo(0,y); bc.lineTo(W,y); bc.stroke(); }
}

// ── EMOJI-SPRITES ─────────────────────────────────────────────────────────────
const EMOJIS = ['🧑','👩','👨','🧔','👴','👵'];
const SPRITE_SIZE = 32;
const emojiSprites = {};

function buildEmojiSprites() {
  EMOJIS.forEach(e => {
    const oc = document.createElement('canvas');
    oc.width = oc.height = SPRITE_SIZE;
    const c2 = oc.getContext('2d');
    c2.font = `${SPRITE_SIZE - 4}px serif`;
    c2.textAlign = 'center';
    c2.textBaseline = 'middle';
    c2.fillText(e, SPRITE_SIZE/2, SPRITE_SIZE/2 + 1);
    emojiSprites[e] = oc;
  });
}
buildEmojiSprites();

// ── ENTITÄTEN ─────────────────────────────────────────────────────────────────
let robots = [], humans = [], particles = [], floats = [];
let totalEaten = 0, takenOver = false;

const ROBOT_SPEED = 1.6;
const HUMAN_SPEED = 1.0;
const EAT_RADIUS  = 20;
const DT_CAP      = 1 / 20;

function spawnAll() {
  robots = []; humans = [];
  for (let i = 0; i < NUM_ROBOTS; i++) spawnRobot();
  for (let i = 0; i < NUM_HUMANS; i++) spawnHuman();
  updateStats();
}

function spawnRobot() {
  const a = Math.random() * Math.PI * 2;
  robots.push({ x: 50 + Math.random()*(W-100), y: 50 + Math.random()*(H-100),
    dx: Math.cos(a)*ROBOT_SPEED, dy: Math.sin(a)*ROBOT_SPEED,
    mouth: 0.25, mouthDir: 1, size: 16 + Math.random()*8,
    wanderA: a, wanderT: 0, targetIdx: -1, alpha: 0 });
}

function spawnHuman(x, y) {
  const a = Math.random() * Math.PI * 2;
  humans.push({ x: x ?? (30 + Math.random()*(W-60)), y: y ?? (30 + Math.random()*(H-60)),
    dx: Math.cos(a)*HUMAN_SPEED, dy: Math.sin(a)*HUMAN_SPEED,
    fleeing: false, changeT: 60 + Math.random()*120,
    alive: true, deathAlpha: 0, size: SPRITE_SIZE,
    emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    bounceT: Math.random()*Math.PI*2 });
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function updateRobots(dt) {
  const speed = ROBOT_SPEED * dt * 60;
  robots.forEach(r => {
    if (r.alpha < 1) r.alpha = Math.min(1, r.alpha + dt * 3);

    let nearDist = Infinity, nearIdx = -1;
    for (let i = 0; i < humans.length; i++) {
      if (!humans[i].alive) continue;
      const d = Math.hypot(r.x - humans[i].x, r.y - humans[i].y);
      if (d < nearDist) { nearDist = d; nearIdx = i; }
    }
    r.targetIdx = nearIdx;

    if (nearIdx >= 0 && nearDist < W * 0.4) {
      const h = humans[nearIdx];
      const a = Math.atan2(h.y - r.y, h.x - r.x);
      r.dx += Math.cos(a) * 0.12 * speed;
      r.dy += Math.sin(a) * 0.12 * speed;
    } else {
      r.wanderT -= dt * 60;
      if (r.wanderT <= 0) { r.wanderA += (Math.random()-0.5)*1.8; r.wanderT = 40 + Math.random()*80; }
      r.dx += Math.cos(r.wanderA) * 0.08 * speed;
      r.dy += Math.sin(r.wanderA) * 0.08 * speed;
    }

    const spd = Math.hypot(r.dx, r.dy);
    const maxSpd = speed * 1.4;
    if (spd > maxSpd) { r.dx = r.dx/spd*maxSpd; r.dy = r.dy/spd*maxSpd; }

    r.x += r.dx; r.y += r.dy;
    const s = r.size;
    if (r.x < s)   { r.x = s;   r.dx =  Math.abs(r.dx); }
    if (r.x > W-s) { r.x = W-s; r.dx = -Math.abs(r.dx); }
    if (r.y < s)   { r.y = s;   r.dy =  Math.abs(r.dy); }
    if (r.y > H-s) { r.y = H-s; r.dy = -Math.abs(r.dy); }

    r.mouth += 0.05 * r.mouthDir * dt * 60;
    if (r.mouth > 0.37) r.mouthDir = -1;
    if (r.mouth < 0.02) r.mouthDir =  1;

    if (nearIdx >= 0 && nearDist < EAT_RADIUS + r.size * 0.5) {
      const h = humans[nearIdx];
      if (h.alive) {
        h.alive = false; h.deathAlpha = 1;
        totalEaten++;
        emitParticles(h.x, h.y);
        addFloat(h.x, h.y, ['Ersetzt!','Automatisiert!','Überflüssig!','Job weg!'][Math.floor(Math.random()*4)]);
        setTimeout(() => spawnHuman(), 3000 + Math.random()*4000);
        updateStats();
        if (humans.filter(h => h.alive).length === 0) triggerTakeover();
      }
    }
  });
}

function updateHumans(dt) {
  const speed = HUMAN_SPEED * dt * 60;
  humans.forEach(h => {
    if (!h.alive) { h.deathAlpha -= dt * 2; return; }
    h.bounceT += dt * (h.fleeing ? 12 : 4);

    let closestDist = Infinity, closestRobot = null;
    for (let i = 0; i < robots.length; i++) {
      const d = Math.hypot(h.x - robots[i].x, h.y - robots[i].y);
      if (d < closestDist) { closestDist = d; closestRobot = robots[i]; }
    }

    if (closestRobot && closestDist < 160) {
      h.fleeing = true;
      const a = Math.atan2(h.y - closestRobot.y, h.x - closestRobot.x);
      h.dx += Math.cos(a) * 0.3 * speed;
      h.dy += Math.sin(a) * 0.3 * speed;
      const spd = Math.hypot(h.dx, h.dy);
      if (spd > speed * 2.0) { h.dx = h.dx/spd*speed*2.0; h.dy = h.dy/spd*speed*2.0; }
    } else {
      h.fleeing = false;
      h.changeT -= dt * 60;
      if (h.changeT <= 0) {
        const a = Math.random() * Math.PI * 2;
        h.dx = Math.cos(a) * HUMAN_SPEED;
        h.dy = Math.sin(a) * HUMAN_SPEED;
        h.changeT = 60 + Math.random() * 120;
      }
    }

    h.x += h.dx; h.y += h.dy;
    if (h.x < 10)   { h.x = 10;   h.dx =  Math.abs(h.dx); }
    if (h.x > W-10) { h.x = W-10; h.dx = -Math.abs(h.dx); }
    if (h.y < 10)   { h.y = 10;   h.dy =  Math.abs(h.dy); }
    if (h.y > H-10) { h.y = H-10; h.dy = -Math.abs(h.dy); }
  });
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx * dt * 60; p.y += p.dy * dt * 60;
    p.dx *= Math.pow(0.92, dt*60); p.dy *= Math.pow(0.92, dt*60);
    p.life -= dt * 60;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateFloats(dt) {
  for (let i = floats.length-1; i >= 0; i--) {
    floats[i].y -= 0.6 * dt * 60;
    floats[i].life -= dt * 60;
    if (floats[i].life <= 0) floats.splice(i, 1);
  }
}

function emitParticles(x, y) {
  const count = Math.min(12, MAX_PARTICLES - particles.length + 12);
  for (let i = 0; i < count; i++) {
    const a = (i/count) * Math.PI * 2;
    const spd = 1.5 + Math.random() * 2.5;
    particles.push({ x, y, dx: Math.cos(a)*spd, dy: Math.sin(a)*spd,
      life: 35 + Math.random()*25, maxLife: 60,
      r: 155 + Math.floor(Math.random()*100), g: 50 + Math.floor(Math.random()*100) });
  }
  if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
}

function addFloat(x, y, text) { floats.push({ x, y, text, life: 70 }); }

function triggerTakeover() {
  if (takenOver) return;
  takenOver = true;
  for (let i = 0; i < 4; i++) setTimeout(() => spawnRobot(), i*400);
  setTimeout(() => {
    takenOver = false;
    for (let i = 0; i < NUM_HUMANS; i++) spawnHuman();
    updateStats();
  }, 3500);
}

// ── ZEICHNEN ──────────────────────────────────────────────────────────────────
function drawRobot(r) {
  if (r.alpha <= 0) return;
  ctx.globalAlpha = r.alpha;
  const angle = Math.atan2(r.dy, r.dx);
  const ma = r.mouth * Math.PI;
  const cx = r.x, cy = r.y, rad = r.size;

  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, rad, angle + ma, angle + Math.PI*2 - ma);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = 'rgba(255,120,120,0.25)';
  ctx.beginPath();
  ctx.arc(cx - rad*0.25, cy - rad*0.25, rad*0.4, 0, Math.PI*2);
  ctx.fill();

  const ex = cx + Math.cos(angle-0.45) * rad*0.52;
  const ey = cy + Math.sin(angle-0.45) * rad*0.52;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex, ey, rad*0.17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc0000';
  ctx.beginPath(); ctx.arc(ex + Math.cos(angle)*1.5, ey + Math.sin(angle)*1.5, rad*0.09, 0, Math.PI*2); ctx.fill();

  const ax = cx + Math.cos(angle - Math.PI*0.15) * rad*0.5;
  const ay = cy + Math.sin(angle - Math.PI*0.15) * rad*0.5;
  ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax + Math.cos(angle - Math.PI*0.5)*rad*0.7, ay + Math.sin(angle - Math.PI*0.5)*rad*0.7);
  ctx.stroke();
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath();
  ctx.arc(ax + Math.cos(angle - Math.PI*0.5)*rad*0.7, ay + Math.sin(angle - Math.PI*0.5)*rad*0.7, 2.5, 0, Math.PI*2);
  ctx.fill();

  if (r.targetIdx >= 0) {
    const th = humans[r.targetIdx];
    if (th && th.alive) {
      const d = Math.hypot(r.x - th.x, r.y - th.y);
      if (d < 180) {
        ctx.strokeStyle = `rgba(255,50,50,${0.07*(1-d/180)})`;
        ctx.lineWidth = 1;
        ctx.setLineDash([3,8]);
        ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(th.x, th.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawHuman(h) {
  const sprite = emojiSprites[h.emoji];
  if (!sprite) return;
  if (!h.alive) {
    if (h.deathAlpha <= 0) return;
    ctx.globalAlpha = Math.max(0, h.deathAlpha);
    const s = h.size * h.deathAlpha;
    ctx.drawImage(sprite, h.x - s/2, h.y - s/2, s, s);
    ctx.globalAlpha = 1;
    return;
  }
  const bounce = Math.sin(h.bounceT) * (h.fleeing ? 3 : 1.2);
  const s = h.size;
  ctx.drawImage(sprite, h.x - s/2, h.y - s/2 + bounce, s, s);
  if (h.fleeing) {
    ctx.fillStyle = 'rgba(255,100,0,0.8)';
    ctx.beginPath();
    ctx.arc(h.x + s*0.4, h.y - s*0.4 + bounce, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawParticles() {
  particles.forEach(p => {
    const a = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = `rgba(${p.r},${p.g},0,${a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, 3*a), 0, Math.PI*2);
    ctx.fill();
  });
}

function drawFloats() {
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  floats.forEach(f => {
    ctx.globalAlpha = Math.max(0, f.life / 70);
    ctx.fillStyle = '#ff4444';
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;
}

// ── STATISTIK ─────────────────────────────────────────────────────────────────
let statDirty = false;
function updateStats() { statDirty = true; }
function flushStats() {
  if (!statDirty) return; statDirty = false;
  document.getElementById('s-robots').textContent = robots.length;
  document.getElementById('s-eaten').textContent  = totalEaten;
  document.getElementById('s-humans').textContent = humans.filter(h => h.alive).length;
}

// ── HAUPT-LOOP ─────────────────────────────────────────────────────────────────
let lastTs = 0, statTick = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  let dt = (ts - lastTs) / 1000;
  lastTs = ts;
  if (dt > DT_CAP || dt <= 0) dt = DT_CAP;

  checkFPS(ts);

  // Blitz-Timer
  lightningTimer += dt;
  if (lightningTimer >= nextLightningIn) {
    lightningTimer = 0;
    triggerLightning();
  }

  updateRobots(dt);
  updateHumans(dt);
  updateParticles(dt);
  updateFloats(dt);

  ctx.drawImage(bgCanvas, 0, 0);
  drawParticles();
  humans.forEach(drawHuman);
  robots.forEach(drawRobot);
  drawLightning(dt);
  drawFloats();

  statTick++;
  if (statTick >= 20) { statTick = 0; flushStats(); }
}

// ── START ─────────────────────────────────────────────────────────────────────
resize();
spawnAll();
scheduleLightning();
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
